# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Reverse proxy para HUB Vendas API
#
# OPÇÃO A (mais simples): usar Nginx Proxy Manager no Portainer.
#   Neste caso este arquivo não é necessário — configure o NPM pela UI.
#
# OPÇÃO B: nginx nativo no VPS (Ubuntu).
#   sudo apt install nginx
#   sudo cp deploy/nginx/nginx.conf /etc/nginx/sites-available/hub-vendas
#   sudo ln -s /etc/nginx/sites-available/hub-vendas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# OPÇÃO C: nginx como container no mesmo stack (descomentar serviço abaixo
#          no docker-compose.yml e montar este arquivo como volume).
# ─────────────────────────────────────────────────────────────────────────────

upstream hub_vendas_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ─── HTTP → HTTPS redirect (produção com SSL) ────────────────────────────────
server {
    listen 80;
    server_name seudominio.com.br;              # ← trocar pelo domínio real

    # Descomente após obter certificado SSL com Certbot:
    # return 301 https://$host$request_uri;

    # Enquanto não tiver SSL, servir direto via HTTP:
    include /etc/nginx/snippets/proxy-hub-vendas.conf;
}

